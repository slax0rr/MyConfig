[window]
decorations = "full"
dynamic_title = true
startup_mode = "Windowed"
opacity = 1.0

[window.padding]
x = 0
y = 0

[font]
size = 10.0

[font.normal]
family = "PragmataProMonoNerdFont"
style = "Regular"

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "Insert", mods = "Shift", action = "Paste" },
  { key = "Return", mods = "Shift", chars = "\r" },
]

[env]
TERM = "xterm-256color"

# Catppuccin Macchiato (matches nvim + i3)
[colors.primary]
background = "#24273a"
foreground = "#cad3f5"

[colors.normal]
black   = "#494d64"
red     = "#ed8796"
green   = "#a6da95"
yellow  = "#eed49f"
blue    = "#8aadf4"
magenta = "#f5bde6"
cyan    = "#8bd5ca"
white   = "#cad3f5"

[colors.bright]
black   = "#5b6078"
red     = "#ed8796"
green   = "#a6da95"
yellow  = "#eed49f"
blue    = "#8aadf4"
magenta = "#f5bde6"
cyan    = "#8bd5ca"
white   = "#b8c0e0"
